<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #2da44e;
      --accent-dim: #1a7f37;
      --offline: #afb8c1;
      --error: #cf222e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .refresh-info {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .refresh-info span { color: var(--accent); }
    main {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    aside {
      width: 280px;
      min-width: 280px;
      border-right: 1px solid var(--border);
      padding: 1rem 0;
      overflow-y: auto;
    }
    .robots-title,
    .cameras-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 0 1rem 0.5rem;
    }
    .cameras-title { margin-top: 1rem; }
    .robot-item,
    .camera-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .robot-item:hover,
    .camera-item:hover { background: rgba(0,0,0,0.04); }
    .robot-item.active {
      background: rgba(45, 164, 78, 0.12);
      border-left-color: var(--accent);
    }
    .camera-item.active {
      background: rgba(9, 105, 218, 0.1);
      border-left-color: #0969da;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.online {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    .status-dot.offline {
      background: var(--offline);
    }
    .robot-mac {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 1rem 1.5rem;
    }
    .section-header {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .logs-panel {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }
    .logs-title {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .logs-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .log-line {
      padding: 0.2rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      word-break: break-all;
    }
    .log-line:last-child { border-bottom: none; }
    .empty-state, .error-state {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
    }
    .error-state { color: var(--error); }
    .loading { opacity: 0.7; pointer-events: none; }
    .api-status {
      margin: 0.75rem 1rem;
      padding: 0.5rem 0.6rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      word-break: break-all;
    }
    .api-status.error { color: var(--error); border-color: var(--error); }
    .control-bar {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0 0.75rem;
      flex-wrap: wrap;
    }
    .control-bar.visible { display: flex; }
    .control-bar button {
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--panel);
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    .control-bar button:hover:not(:disabled) {
      background: rgba(0,0,0,0.05);
      border-color: var(--text-muted);
    }
    .control-bar button:disabled { opacity: 0.6; cursor: not-allowed; }
    .control-bar button.btn-left { border-color: #0969da; color: #0969da; }
    .control-bar button.btn-right { border-color: #0969da; color: #0969da; }
    .control-bar button.btn-ota { border-color: #bf8700; color: #9a6700; }
    .control-feedback {
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
      border-radius: 4px;
      max-width: 280px;
      word-break: break-all;
    }
    .control-feedback.success { background: rgba(45, 164, 78, 0.15); color: var(--accent-dim); }
    .control-feedback.error { background: rgba(207, 34, 46, 0.1); color: var(--error); }
    .images-panel {
      margin-top: 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 120px;
      max-height: 320px;
    }
    .images-panel .images-title {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .images-panel .images-list-wrap {
      flex: 1;
      overflow-y: auto;
      min-height: 80px;
    }
    .images-panel .images-placeholder,
    .images-panel .images-loading {
      padding: 1.25rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .image-row {
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      transition: background 0.15s;
    }
    .image-row:hover { background: rgba(0,0,0,0.04); }
    .image-row:last-child { border-bottom: none; }
    .image-row-time { color: var(--text); font-weight: 500; }
    .image-row-filename { color: var(--text-muted); margin-left: 0.5rem; }
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .preview-overlay.visible { display: flex; }
    .preview-content {
      max-width: 95vw;
      max-height: 90vh;
      background: var(--panel);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .preview-content img { display: block; max-width: 100%; max-height: 85vh; object-fit: contain; }
    .preview-close {
      display: block;
      width: 100%;
      padding: 0.5rem 1rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      border: none;
      background: var(--border);
      cursor: pointer;
    }
    .preview-close:hover { background: var(--text-muted); color: var(--panel); }
  </style>
</head>
<body>
  <header>
    <h1>Robot Dashboard</h1>
    <div class="refresh-info">Auto-refresh: <span id="countdown">--</span>s</div>
  </header>
  <main>
    <aside>
      <div class="robots-title">Robots</div>
      <div id="robot-list"></div>
      <div class="cameras-title">Cameras</div>
      <div id="camera-list"></div>
      <div id="api-status" class="api-status"></div>
    </aside>
    <section class="section">
      <div class="section-header">Latest logs (last 50) — <span id="selected-robot-label">Select a robot</span></div>
      <div id="control-bar" class="control-bar">
        <button type="button" id="btn-run-left" class="btn-left" title="Trigger start with direction left">← Run Left</button>
        <button type="button" id="btn-run-right" class="btn-right" title="Trigger start with direction right">Run Right →</button>
        <button type="button" id="btn-ota" class="btn-ota" title="Flag robot for OTA update">↑ OTA Update</button>
        <span id="control-feedback" class="control-feedback" aria-live="polite"></span>
      </div>
      <div class="logs-panel">
        <div class="logs-title" id="logs-panel-title">Logs</div>
        <div class="logs-content" id="logs-content"></div>
      </div>
      <div class="images-panel">
        <div class="images-title" id="images-panel-title">Images</div>
        <div class="images-list-wrap" id="images-list-wrap">
          <div id="images-placeholder" class="images-placeholder">Select a robot to view images</div>
          <div id="images-loading" class="images-loading" style="display: none;">Loading images…</div>
          <div id="images-list" style="display: none;"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="preview-overlay" class="preview-overlay" aria-hidden="true">
    <div class="preview-content">
      <img id="preview-img" alt="Preview" />
      <button type="button" class="preview-close" id="preview-close">Close</button>
    </div>
  </div>
  <script>
    // Always hit the original robot API (server must send CORS headers).
    const API_BASE = window.ROBOT_DASHBOARD_API || 'https://server2.sudoyantra.com';
    // Port 8000 only for control buttons (start/ota)
    const API_BASE_CONTROL = window.ROBOT_DASHBOARD_API_CONTROL || (API_BASE);
    const REFRESH_INTERVAL_MS = 10000;
    const ONLINE_THRESHOLD_MS = 120000; // 2 min = online
    const HARDCODED_CAMERAS = ['2805a503de4c'];

    let robots = [];
    let robotStatus = {}; // mac -> { lastSeen, online }
    let selectedMac = null;
    let cameras = [];     // camera MACs from /image/
    let selectedCameraMac = null;
    let refreshTimer = null;
    let countdownTimer = null;

    function api(path) {
      return (API_BASE || '') + path;
    }

    // Use proxy for image directory fetch when cross-origin (avoids CORS)
    // Set window.ROBOT_IMAGE_API to override (e.g. if /image/ is on another server/port)
    function imageApiBaseForFetch() {
      if (window.ROBOT_IMAGE_API) return (window.ROBOT_IMAGE_API + '').replace(/\/$/, '') + '/image';
      const base = (API_BASE || '').replace(/\/$/, '');
      try {
        const apiOrigin = new URL(base).origin;
        if (window.location.origin === apiOrigin) return base + '/image';
      } catch (_) {}
      return window.location.origin + '/api-image';
    }

    // Direct URL for <img src> (images load cross-origin)
    function imageApiBaseForDisplay() {
      if (window.ROBOT_IMAGE_API) return (window.ROBOT_IMAGE_API + '').replace(/\/$/, '') + '/image';
      return (API_BASE || '').replace(/\/$/, '') + '/image';
    }

    function parseDirectoryListing(html, wantFiles) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const links = doc.querySelectorAll('a[href]');
      const out = [];
      const imageExt = /\.(jpe?g|png|gif|webp|bmp)$/i;
      for (const a of links) {
        let href = (a.getAttribute('href') || '').trim();
        const text = (a.textContent || '').trim();
        if (!href || href === '../' || href === '..') continue;
        if (wantFiles) {
          if (!imageExt.test(href)) continue;
          out.push({ href: href.replace(/^\//, ''), text: text || href });
        } else {
          if (!href.endsWith('/')) continue;
          const dirName = href.replace(/\/$/, '').split('/').pop() || href.replace(/\/$/, '');
          out.push({ href: dirName, text: (text || dirName).replace(/\/$/, '') });
        }
      }
      // Fallback: directory listing may use different HTML; look for MAC-like dirs (12 hex chars)
      if (!wantFiles && out.length === 0 && html) {
        const macDirRegex = /([0-9a-fA-F]{12})\/?/g;
        const seen = new Set();
        let match;
        while ((match = macDirRegex.exec(html)) !== null) {
          const mac = match[1].toLowerCase();
          if (!seen.has(mac)) {
            seen.add(mac);
            out.push({ href: mac, text: mac });
          }
        }
      }
      return out;
    }

    function parseTimestampFromFilename(filename) {
      const m = filename.match(/(\d{4})[-_]?(\d{2})[-_]?(\d{2})[-_]?(\d{2})[-_]?(\d{2})[-_]?(\d{2})/);
      if (m) {
        const d = new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10), parseInt(m[4],10), parseInt(m[5],10), parseInt(m[6],10));
        return d.getTime();
      }
      const m2 = filename.match(/(\d{14})/);
      if (m2) {
        const s = m2[1];
        const d = new Date(parseInt(s.slice(0,4),10), parseInt(s.slice(4,6),10)-1, parseInt(s.slice(6,8),10), parseInt(s.slice(8,10),10), parseInt(s.slice(10,12),10), parseInt(s.slice(12,14),10));
        return d.getTime();
      }
      // Unix timestamp in filename (e.g. 1773605220.jpg)
      const m3 = filename.match(/(\d{10})(\.|$)/);
      if (m3) return parseInt(m3[1], 10) * 1000;
      const m4 = filename.match(/(\d{13})(\.|$)/);
      if (m4) return parseInt(m4[1], 10);
      return 0;
    }

    function formatImageTime(ms) {
      if (!ms) return '—';
      const d = new Date(ms);
      return d.toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'medium' });
    }

    function showPreview(imageUrl) {
      const overlay = document.getElementById('preview-overlay');
      const img = document.getElementById('preview-img');
      if (!overlay || !img) return;
      img.src = imageUrl;
      overlay.classList.add('visible');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function hidePreview() {
      const overlay = document.getElementById('preview-overlay');
      const img = document.getElementById('preview-img');
      if (overlay) {
        overlay.classList.remove('visible');
        overlay.setAttribute('aria-hidden', 'true');
      }
      if (img) img.src = '';
    }

    function parseMacsResponse(text) {
      const t = text.trim();
      if (!t) return [];
      if (t.startsWith('[') || t.startsWith('{')) {
        try {
          const data = JSON.parse(t);
          return Array.isArray(data) ? data : (data.macs || data.robots || []);
        } catch (_) { /* fall through to text parse */ }
      }
      return t.split(/[\r\n]+/).map(s => s.trim()).filter(Boolean);
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('api-status');
      if (!el) return;
      el.textContent = msg;
      el.className = 'api-status' + (isError ? ' error' : '');
    }

    async function fetchCameraMacs() {
      const directUrl = (API_BASE || '').replace(/\/$/, '') + '/image/';
      const proxyUrl = imageApiBaseForFetch() + '/';
      const urlsToTry = [];
      if (proxyUrl.startsWith('http')) urlsToTry.push(proxyUrl);
      if (directUrl.startsWith('http') && !urlsToTry.includes(directUrl)) urlsToTry.push(directUrl);
      for (const url of urlsToTry) {
        try {
          const res = await fetch(url);
          const html = await res.text();
          if (!res.ok) continue;
          const entries = parseDirectoryListing(html, false);
          const macs = entries.map(e => (e.href || e.text || '').trim()).filter(Boolean);
          if (macs.length) return macs;
        } catch (_) {}
      }
      return [];
    }

    async function fetchRobots() {
      const url = api('/macs');
      setStatus('Loading robots…');
      try {
        const res = await fetch(url);
        const text = await res.text();
        if (!res.ok) {
          const preview = text.slice(0, 120).replace(/\s+/g, ' ');
          setStatus(`Robots: ${res.status} ${res.statusText}. ${preview}`, true);
          throw new Error(`Robots: ${res.status} ${res.statusText}`);
        }
        const list = parseMacsResponse(text);
        const macs = list.map(r => typeof r === 'string' ? r : (r.mac ?? r.id ?? r)).filter(Boolean);
        setStatus(macs.length ? `API: ${url}` : `API returned empty (check ${url})`, !macs.length);
        return macs;
      } catch (e) {
        const msg = (e.name === 'TypeError' && /fetch|network|loaded/i.test(String(e.message)))
          ? 'Network or CORS error — open DevTools (F12) → Network to see blocked request'
          : (e.message || String(e));
        setStatus('Robots: ' + msg, true);
        throw e;
      }
    }

    function parseJsonOrText(text) {
      const t = text.trim();
      if (t.startsWith('[') || t.startsWith('{')) {
        try { return JSON.parse(t); } catch (_) { }
      }
      return { logs: t.split(/[\r\n]+/).map(s => s.trim()).filter(Boolean) };
    }

    async function fetchLogs(mac) {
      const url = api('/view/' + encodeURIComponent(mac));
      try {
        const res = await fetch(url);
        const text = await res.text();
        if (!res.ok) throw new Error(`Logs: ${res.status} ${res.statusText}`);
        return parseJsonOrText(text);
      } catch (e) {
        setStatus('Logs: ' + (e.message || e), true);
        throw e;
      }
    }

    function renderRobotList() {
      const el = document.getElementById('robot-list');
      if (!robots.length) {
        el.innerHTML = '<div class="empty-state">No robots found</div>';
        return;
      }
      el.innerHTML = [...robots].reverse().map((mac) => {
        const status = robotStatus[mac];
        const online = status && status.online;
        const active = mac === selectedMac;
        const label = `Robot ${robots.indexOf(mac) + 1} (${mac})`;
        return `<div class="robot-item ${active ? 'active' : ''}" data-mac="${escapeHtml(mac)}">
          <span class="status-dot ${online ? 'online' : 'offline'}"></span>
          <span class="robot-mac">${escapeHtml(label)}</span>
        </div>`;
      }).join('');
      el.querySelectorAll('.robot-item').forEach(node => {
        node.addEventListener('click', () => selectRobot(node.dataset.mac));
      });
    }

    function renderCameraList() {
      const el = document.getElementById('camera-list');
      if (!el) return;
      if (!cameras.length) {
        el.innerHTML = '<div class="empty-state">No cameras found</div>';
        return;
      }
      el.innerHTML = cameras.map((mac) => {
        const active = mac === selectedCameraMac;
        const label = mac.toUpperCase();
        return `<div class="camera-item ${active ? 'active' : ''}" data-camera-mac="${escapeHtml(mac)}">
          <span class="robot-mac">${escapeHtml(label)}</span>
        </div>`;
      }).join('');
      el.querySelectorAll('.camera-item').forEach(node => {
        node.addEventListener('click', () => selectCamera(node.dataset.cameraMac));
      });
    }

    function selectCamera(mac) {
      selectedCameraMac = mac || null;
      renderCameraList();
      updateImagesPanelFromSelection();
    }

    function selectRobot(mac) {
      selectedMac = mac;
      const idx = robots.indexOf(mac);
      const label = mac ? (idx >= 0 ? `Robot ${idx + 1} (${mac})` : mac) : 'Select a robot';
      document.getElementById('selected-robot-label').textContent = label;
      const controlBar = document.getElementById('control-bar');
      if (controlBar) {
        controlBar.classList.toggle('visible', !!mac);
      }
      updateImagesPanelFromSelection();
      renderRobotList();
      if (mac) loadLogs(mac);
      else {
        document.getElementById('logs-content').innerHTML = '<div class="empty-state">Select a robot to view logs</div>';
      }
    }

    function updateImagesPanelFromSelection() {
      const macForImages = selectedCameraMac || selectedMac;
      const isCamera = !!selectedCameraMac;
      updateImagesPanel(macForImages, isCamera);
    }

    async function loadImageList(mac, isCamera) {
      const placeholder = document.getElementById('images-placeholder');
      const loading = document.getElementById('images-loading');
      const listEl = document.getElementById('images-list');
      const titleEl = document.getElementById('images-panel-title');
      if (!placeholder || !loading || !listEl || !titleEl) return;
      const macNorm = mac.toLowerCase();
      titleEl.textContent = isCamera ? 'Images — Camera ' + mac.toUpperCase() : 'Images — ' + mac;
      placeholder.style.display = 'none';
      listEl.style.display = 'none';
      loading.style.display = 'block';
      listEl.innerHTML = '';
      const baseFetch = imageApiBaseForFetch();
      const baseDisplay = imageApiBaseForDisplay();
      const pathPart = '/' + encodeURIComponent(macNorm);
      let url = baseFetch + pathPart + '/';
      let res = await fetch(url);
      let html = await res.text();
      if (res.status === 404) {
        url = baseFetch + pathPart;
        res = await fetch(url);
        html = await res.text();
      }
      try {
        if (!res.ok) {
          listEl.innerHTML = '<div class="images-placeholder">Failed to load image list (' + res.status + '). Try setting window.ROBOT_IMAGE_API before load.</div>';
          listEl.style.display = 'block';
          return;
        }
        const entries = parseDirectoryListing(html, true);
        const withTs = entries.map(e => ({
          href: e.href,
          text: e.text,
          ts: parseTimestampFromFilename(e.href || e.text)
        }));
        withTs.sort((a, b) => (b.ts - a.ts));
        if (withTs.length === 0) {
          listEl.innerHTML = '<div class="images-placeholder">No images for this robot</div>';
        } else {
          listEl.innerHTML = withTs.map(entry => {
            const timeStr = formatImageTime(entry.ts);
            const imgUrl = baseDisplay + '/' + encodeURIComponent(macNorm) + '/' + encodeURIComponent(entry.href);
            return '<div class="image-row" data-url="' + escapeHtml(imgUrl) + '" role="button" tabindex="0">' +
              '<span class="image-row-time">' + escapeHtml(timeStr) + '</span>' +
              '<span class="image-row-filename">' + escapeHtml(entry.href) + '</span></div>';
          }).join('');
          listEl.querySelectorAll('.image-row').forEach(row => {
            const url = row.dataset.url;
            row.addEventListener('click', () => showPreview(url));
            row.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showPreview(url); } });
          });
        }
        listEl.style.display = 'block';
      } catch (e) {
        listEl.innerHTML = '<div class="images-placeholder error-state">' + escapeHtml(e.message || String(e)) + '</div>';
        listEl.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    function updateImagesPanel(mac, isCamera) {
      const placeholder = document.getElementById('images-placeholder');
      const loading = document.getElementById('images-loading');
      const listEl = document.getElementById('images-list');
      const titleEl = document.getElementById('images-panel-title');
      if (!placeholder || !titleEl) return;
      if (mac) {
        loadImageList(mac, !!isCamera);
      } else {
        if (loading) loading.style.display = 'none';
        if (listEl) {
          listEl.style.display = 'none';
          listEl.innerHTML = '';
        }
        placeholder.style.display = 'block';
        placeholder.textContent = 'Select a robot or camera to view images';
        titleEl.textContent = 'Images';
      }
    }

    function showControlFeedback(msg, isError) {
      const el = document.getElementById('control-feedback');
      if (!el) return;
      el.textContent = msg || '';
      el.className = 'control-feedback' + (isError ? ' error' : ' success');
      el.style.display = msg ? 'inline-block' : 'none';
      if (msg) {
        clearTimeout(window._controlFeedbackTimer);
        window._controlFeedbackTimer = setTimeout(() => {
          el.textContent = '';
          el.style.display = 'none';
        }, 3500);
      }
    }

    async function triggerControl(path, buttonId) {
      if (!selectedMac) return;
      const btnLeft = document.getElementById('btn-run-left');
      const btnRight = document.getElementById('btn-run-right');
      const btnOta = document.getElementById('btn-ota');
      const buttons = [btnLeft, btnRight, btnOta];
      buttons.forEach(b => { if (b) b.disabled = true; });
      try {
        const url = api(path);
        const res = await fetch(url);
        const text = await res.text();
        if (res.ok) {
          showControlFeedback(text.trim() || 'OK', false);
        } else {
          showControlFeedback(text.trim() || res.status + ' ' + res.statusText, true);
        }
      } catch (e) {
        showControlFeedback(e.message || String(e), true);
      } finally {
        buttons.forEach(b => { if (b) b.disabled = false; });
      }
    }

    function setupControlButtons() {
      document.getElementById('btn-run-left')?.addEventListener('click', () => {
        triggerControl('/start/' + encodeURIComponent(selectedMac) + '/set/left', 'btn-run-left');
      });
      document.getElementById('btn-run-right')?.addEventListener('click', () => {
        triggerControl('/start/' + encodeURIComponent(selectedMac) + '/set/right', 'btn-run-right');
      });
      document.getElementById('btn-ota')?.addEventListener('click', () => {
        triggerControl('/ota/' + encodeURIComponent(selectedMac) + '/set', 'btn-ota');
      });
    }

    function setRobotOnline(mac, online) {
      if (!robotStatus[mac]) robotStatus[mac] = {};
      robotStatus[mac].lastSeen = Date.now();
      robotStatus[mac].online = online;
    }

    async function loadLogs(mac) {
      const content = document.getElementById('logs-content');
      content.innerHTML = '<div class="empty-state">Loading…</div>';
      try {
        const data = await fetchLogs(mac);
        setRobotOnline(mac, true);
        const logs = data.logs ?? data.data ?? (Array.isArray(data) ? data : []);
        const lines = Array.isArray(logs) ? [...logs].reverse() : [logs];
        if (lines.length === 0) {
          content.innerHTML = '<div class="empty-state">No logs yet</div>';
        } else {
          content.innerHTML = lines.map(l => {
            const text = typeof l === 'string' ? l : (l.message ?? l.text ?? JSON.stringify(l));
            const time = l.timestamp ?? l.time ?? '';
            return `<div class="log-line">${time ? `<span class="text-muted">${time}</span> ` : ''}${escapeHtml(text)}</div>`;
          }).join('');
        }
      } catch (e) {
        setRobotOnline(mac, false);
        content.innerHTML = `<div class="error-state">${escapeHtml(e.message)}</div>`;
      }
      renderRobotList();
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function refresh() {
      try {
        const macs = await fetchRobots();
        robots = [...new Set(macs)];
        robotStatus = robots.reduce((acc, mac) => {
          if (!acc[mac]) acc[mac] = robotStatus[mac] || {};
          if (Date.now() - (acc[mac].lastSeen || 0) > ONLINE_THRESHOLD_MS) acc[mac].online = false;
          return acc;
        }, {});
        renderRobotList();
        const fetched = await fetchCameraMacs();
        cameras = fetched.length ? [...new Set([...HARDCODED_CAMERAS, ...fetched])] : HARDCODED_CAMERAS.slice();
        renderCameraList();
        if (selectedMac) loadLogs(selectedMac);
      } catch (e) {
        document.getElementById('robot-list').innerHTML = `<div class="error-state">${escapeHtml(e.message)}</div>`;
      }
      startCountdown();
    }

    function startCountdown() {
      let sec = REFRESH_INTERVAL_MS / 1000;
      document.getElementById('countdown').textContent = sec;
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        sec--;
        document.getElementById('countdown').textContent = Math.max(0, sec);
        if (sec <= 0) clearInterval(countdownTimer);
      }, 1000);
    }

    function startRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refresh();
      refreshTimer = setInterval(refresh, REFRESH_INTERVAL_MS);
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupControlButtons();
      startRefresh();
      document.getElementById('preview-close')?.addEventListener('click', hidePreview);
      document.getElementById('preview-overlay')?.addEventListener('click', (e) => {
        if (e.target.id === 'preview-overlay') hidePreview();
      });
    });
  </script>
</body>
</html>
