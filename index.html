<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f8fa" />
  <title>Robot Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #2da44e;
      --accent-dim: #1a7f37;
      --offline: #afb8c1;
      --error: #cf222e;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: rgba(45, 164, 78, 0.15);
    }
    header {
      padding: calc(0.75rem + var(--safe-top)) 1rem 0.75rem;
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      background: var(--panel);
    }
    h1 {
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .refresh-info {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .refresh-info span { color: var(--accent); }
    main {
      flex: 1;
      display: flex;
      min-height: 0;
      flex-direction: row;
    }
    aside {
      width: 280px;
      min-width: 240px;
      border-right: 1px solid var(--border);
      padding: 0.75rem 0;
      overflow-y: auto;
      background: var(--panel);
    }
    .robots-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 0 1rem 0.5rem;
    }
    .robot-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      min-height: 48px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .robot-item:active { background: rgba(0,0,0,0.06); }
    .robot-item:hover { background: rgba(0,0,0,0.04); }
    .robot-item.active {
      background: rgba(45, 164, 78, 0.12);
      border-left-color: var(--accent);
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.online {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    .status-dot.offline { background: var(--offline); }
    .robot-mac {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.8rem, 2.8vw, 0.9rem);
      font-weight: 500;
    }
    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 0.75rem 1rem 1rem;
      padding-bottom: max(1rem, var(--safe-bottom));
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
    }
    .section-header {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      line-height: 1.35;
    }
    .logs-panel {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }
    .logs-title {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .logs-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.72rem, 2.5vw, 0.8rem);
      line-height: 1.5;
      -webkit-overflow-scrolling: touch;
    }
    .log-line {
      padding: 0.25rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      word-break: break-word;
    }
    .log-line:last-child { border-bottom: none; }
    .log-line .text-muted { color: var(--text-muted); }
    .empty-state, .error-state {
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-muted);
    }
    .error-state { color: var(--error); }
    .api-status {
      margin: 0.5rem 1rem 0;
      padding: 0.5rem 0.6rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      word-break: break-word;
    }
    .api-status.error { color: var(--error); border-color: var(--error); }
    .control-bar {
      display: none;
      gap: 0.5rem;
      padding: 0 0 0.65rem;
      flex-wrap: wrap;
    }
    .control-bar.visible { display: flex; }
    .control-bar button {
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.65rem 0.85rem;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: var(--panel);
      color: var(--text);
      touch-action: manipulation;
    }
    .control-bar button:active:not(:disabled) { transform: scale(0.98); }
    .control-bar button:hover:not(:disabled) {
      background: rgba(0,0,0,0.05);
      border-color: var(--text-muted);
    }
    .control-bar button:disabled { opacity: 0.6; cursor: not-allowed; }
    .control-bar button.btn-left { border-color: #0969da; color: #0969da; }
    .control-bar button.btn-right { border-color: #0969da; color: #0969da; }
    .control-bar button.btn-ota { border-color: #bf8700; color: #9a6700; }
    .control-bar button.btn-move { border-color: #1f6feb; color: #1f6feb; }
    .control-bar button.btn-stop { border-color: var(--error); color: var(--error); }
    #move-duration-ms {
      width: 6.5rem;
      max-width: 100%;
      padding: 0.5rem 0.5rem;
      min-height: 44px;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    .control-feedback {
      font-size: 0.78rem;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      width: 100%;
      flex-basis: 100%;
      word-break: break-word;
    }
    .control-feedback.success { background: rgba(45, 164, 78, 0.15); color: var(--accent-dim); }
    .control-feedback.error { background: rgba(207, 34, 46, 0.1); color: var(--error); }

    @media (max-width: 768px) {
      main { flex-direction: column; }
      aside {
        width: 100%;
        min-width: 0;
        max-height: min(42vh, 320px);
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .section { padding-top: 0.5rem; }
      .control-bar button {
        flex: 1 1 calc(50% - 0.25rem);
        min-width: calc(50% - 0.25rem);
      }
      #move-duration-ms {
        width: 100%;
        flex: 1 1 100%;
      }
      .logs-panel { min-height: 35vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Robot Dashboard</h1>
    <div class="refresh-info">Refresh: <span id="countdown">--</span>s</div>
  </header>
  <main>
    <aside>
      <div class="robots-title">Robots</div>
      <div id="robot-list"></div>
      <div id="api-status" class="api-status"></div>
    </aside>
    <section class="section">
      <div class="section-header">Latest logs — <span id="selected-robot-label">Select a robot</span></div>
      <div id="control-bar" class="control-bar">
        <input type="number" id="move-duration-ms" min="1" step="100" value="1500" inputmode="numeric" title="Move duration (ms)" />
        <button type="button" id="btn-move-forward" class="btn-move">Forward</button>
        <button type="button" id="btn-move-backward" class="btn-move">Backward</button>
        <button type="button" id="btn-stop" class="btn-stop">Stop</button>
        <button type="button" id="btn-run-left" class="btn-left">← Left</button>
        <button type="button" id="btn-run-right" class="btn-right">Right →</button>
        <button type="button" id="btn-ota" class="btn-ota">OTA</button>
        <span id="control-feedback" class="control-feedback" aria-live="polite"></span>
      </div>
      <div class="logs-panel">
        <div class="logs-title">Logs</div>
        <div class="logs-content" id="logs-content"></div>
      </div>
    </section>
  </main>
  <script>
    const API_BASE = 'https://server2.sudoyantra.com';
    const API_BASE_CONTROL = (window.ROBOT_DASHBOARD_API_CONTROL || 'https://server2.sudoyantra.com/api').replace(/\/$/, '');
    const REFRESH_INTERVAL_MS = 10000;
    const ONLINE_THRESHOLD_MS = 120000;
    const FETCH_TIMEOUT_MS = 15000;

    let robots = [];
    let robotStatus = {};
    let selectedMac = null;
    let refreshTimer = null;
    let countdownTimer = null;

    function api(path) {
      return API_BASE + (path.startsWith('/') ? path : '/' + path);
    }
    function apiControl(path) {
      const p = path.startsWith('/') ? path : '/' + path;
      return API_BASE_CONTROL + p;
    }

    function fetchWithTimeout(url) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT_MS);
      return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(t));
    }

    function parseMacsResponse(text) {
      const t = text.trim();
      if (!t) return [];
      if (t.startsWith('[') || t.startsWith('{')) {
        try {
          const data = JSON.parse(t);
          return Array.isArray(data) ? data : (data.macs || data.robots || []);
        } catch (_) { }
      }
      return t.split(/[\r\n]+/).map(s => s.trim()).filter(Boolean);
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('api-status');
      if (!el) return;
      el.textContent = msg;
      el.className = 'api-status' + (isError ? ' error' : '');
    }

    async function fetchRobots() {
      const url = api('/macs');
      setStatus('Loading…');
      try {
        const res = await fetchWithTimeout(url);
        const text = await res.text();
        if (!res.ok) {
          setStatus('Robots: ' + res.status + ' ' + res.statusText, true);
          throw new Error('Robots: ' + res.status);
        }
        const list = parseMacsResponse(text);
        const macs = list.map(r => typeof r === 'string' ? r : (r.mac ?? r.id ?? r)).filter(Boolean);
        setStatus(macs.length ? 'Connected' : 'Empty list', !macs.length);
        return macs;
      } catch (e) {
        const msg = e.name === 'AbortError' ? 'Timed out' : (e.message || String(e));
        setStatus('Robots: ' + msg, true);
        throw e;
      }
    }

    function parseJsonOrText(text) {
      const t = text.trim();
      if (t.startsWith('[') || t.startsWith('{')) {
        try {
          const data = JSON.parse(t);
          if (Array.isArray(data)) return { logs: data };
          if (data && typeof data.logs === 'object') return data;
          if (typeof data === 'string') return { logs: data.split(/[\r\n]+/).map(s => s.trim()).filter(Boolean) };
          return { logs: [].concat(data) };
        } catch (_) { }
      }
      return { logs: t.split(/[\r\n]+/).map(s => s.trim()).filter(Boolean) };
    }

    async function fetchLogs(mac) {
      const viewPath = '/view/' + encodeURIComponent(mac);
      const logPath = '/' + encodeURIComponent(mac) + '/log';
      let res = await fetchWithTimeout(api(viewPath));
      let text = await res.text();
      if (!res.ok) {
        setStatus('Trying /log…');
        res = await fetchWithTimeout(api(logPath));
        text = await res.text();
      }
      if (!res.ok) throw new Error('Logs: ' + res.status);
      return parseJsonOrText(text);
    }

    function renderRobotList() {
      const el = document.getElementById('robot-list');
      if (!robots.length) {
        el.innerHTML = '<div class="empty-state">No robots</div>';
        return;
      }
      el.innerHTML = [...robots].reverse().map((mac) => {
        const status = robotStatus[mac];
        const online = status && status.online;
        const active = mac === selectedMac;
        const label = `Robot ${robots.indexOf(mac) + 1} (${mac})`;
        return `<div class="robot-item ${active ? 'active' : ''}" data-mac="${escapeHtml(mac)}">
          <span class="status-dot ${online ? 'online' : 'offline'}"></span>
          <span class="robot-mac">${escapeHtml(label)}</span>
        </div>`;
      }).join('');
      el.querySelectorAll('.robot-item').forEach(node => {
        node.addEventListener('click', () => selectRobot(node.dataset.mac));
      });
    }

    function selectRobot(mac) {
      selectedMac = mac;
      const idx = robots.indexOf(mac);
      const label = mac ? (idx >= 0 ? `Robot ${idx + 1} (${mac})` : mac) : 'Select a robot';
      document.getElementById('selected-robot-label').textContent = label;
      document.getElementById('control-bar').classList.toggle('visible', !!mac);
      renderRobotList();
      if (mac) loadLogs(mac);
      else {
        document.getElementById('logs-content').innerHTML = '<div class="empty-state">Select a robot</div>';
      }
    }

    function showControlFeedback(msg, isError) {
      const el = document.getElementById('control-feedback');
      if (!el) return;
      el.textContent = msg || '';
      el.className = 'control-feedback' + (isError ? ' error' : ' success');
      el.style.display = msg ? 'block' : 'none';
      if (msg) {
        clearTimeout(window._controlFeedbackTimer);
        window._controlFeedbackTimer = setTimeout(() => {
          el.textContent = '';
          el.style.display = 'none';
        }, 3500);
      }
    }

    async function triggerControl(path) {
      if (!selectedMac) return;
      const buttons = [
        document.getElementById('btn-run-left'),
        document.getElementById('btn-run-right'),
        document.getElementById('btn-ota'),
        document.getElementById('btn-move-forward'),
        document.getElementById('btn-move-backward'),
        document.getElementById('btn-stop')
      ];
      buttons.forEach(b => { if (b) b.disabled = true; });
      try {
        const url = apiControl(path);
        const res = await fetchWithTimeout(url);
        const text = await res.text();
        showControlFeedback(text.trim() || (res.ok ? 'OK' : res.status + ' ' + res.statusText), !res.ok);
      } catch (e) {
        showControlFeedback(e.message || String(e), true);
      } finally {
        buttons.forEach(b => { if (b) b.disabled = false; });
      }
    }

    function setupControlButtons() {
      const getMoveMs = () => {
        const raw = document.getElementById('move-duration-ms')?.value || '1500';
        const ms = parseInt(raw, 10);
        return Number.isFinite(ms) && ms >= 1 ? ms : null;
      };
      document.getElementById('btn-move-forward')?.addEventListener('click', () => {
        const ms = getMoveMs();
        if (!ms) return showControlFeedback('Enter valid ms', true);
        triggerControl('/move/' + encodeURIComponent(selectedMac) + '/forward/' + ms);
      });
      document.getElementById('btn-move-backward')?.addEventListener('click', () => {
        const ms = getMoveMs();
        if (!ms) return showControlFeedback('Enter valid ms', true);
        triggerControl('/move/' + encodeURIComponent(selectedMac) + '/backward/' + ms);
      });
      document.getElementById('btn-stop')?.addEventListener('click', () => {
        triggerControl('/stop/' + encodeURIComponent(selectedMac));
      });
      document.getElementById('btn-run-left')?.addEventListener('click', () => {
        triggerControl('/start/' + encodeURIComponent(selectedMac) + '/set/left');
      });
      document.getElementById('btn-run-right')?.addEventListener('click', () => {
        triggerControl('/start/' + encodeURIComponent(selectedMac) + '/set/right');
      });
      document.getElementById('btn-ota')?.addEventListener('click', () => {
        triggerControl('/ota/' + encodeURIComponent(selectedMac) + '/set');
      });
    }

    function setRobotOnline(mac, online) {
      if (!robotStatus[mac]) robotStatus[mac] = {};
      robotStatus[mac].lastSeen = Date.now();
      robotStatus[mac].online = online;
    }

    async function loadLogs(mac) {
      const content = document.getElementById('logs-content');
      content.innerHTML = '<div class="empty-state">Loading…</div>';
      try {
        const data = await fetchLogs(mac);
        setRobotOnline(mac, true);
        const logs = data.logs ?? data.data ?? (Array.isArray(data) ? data : (typeof data === 'string' ? data.split(/[\r\n]+/).map(s => s.trim()).filter(Boolean) : []));
        const lines = Array.isArray(logs) ? [...logs].reverse() : (logs ? [logs] : []);
        if (!lines.length) {
          content.innerHTML = '<div class="empty-state">No logs</div>';
        } else {
          content.innerHTML = lines.map(l => {
            const t = typeof l === 'string' ? l : (l.message ?? l.text ?? JSON.stringify(l));
            const time = l.timestamp ?? l.time ?? '';
            return `<div class="log-line">${time ? `<span class="text-muted">${escapeHtml(String(time))}</span> ` : ''}${escapeHtml(String(t))}</div>`;
          }).join('');
        }
      } catch (e) {
        setRobotOnline(mac, false);
        content.innerHTML = `<div class="error-state">${escapeHtml(e.message)}</div>`;
      }
      renderRobotList();
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function refresh() {
      try {
        const macs = await fetchRobots();
        robots = [...new Set(macs)];
        robotStatus = robots.reduce((acc, mac) => {
          if (!acc[mac]) acc[mac] = robotStatus[mac] || {};
          if (Date.now() - (acc[mac].lastSeen || 0) > ONLINE_THRESHOLD_MS) acc[mac].online = false;
          return acc;
        }, {});
        renderRobotList();
        if (selectedMac) loadLogs(selectedMac);
      } catch (e) {
        document.getElementById('robot-list').innerHTML = `<div class="error-state">${escapeHtml(e.message)}</div>`;
      }
      startCountdown();
    }

    function startCountdown() {
      let sec = REFRESH_INTERVAL_MS / 1000;
      document.getElementById('countdown').textContent = sec;
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        sec--;
        document.getElementById('countdown').textContent = Math.max(0, sec);
        if (sec <= 0) clearInterval(countdownTimer);
      }, 1000);
    }

    function startRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refresh();
      refreshTimer = setInterval(refresh, REFRESH_INTERVAL_MS);
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupControlButtons();
      startRefresh();
    });
  </script>
</body>
</html>
